<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyper-Dense Dystopian Megacity - Combat Update</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <script>
        // GLOBAL ANIMATION SYSTEM
        AFRAME.registerComponent('dystopian-system', {
            init: function() {
                this.drones = [];
                this.citizens = [];
                this.particles = [];
                this.time = 0;
            },
            registerDrone: function(el) { this.drones.push(el); },
            registerCitizen: function(el) { this.citizens.push(el); },
            registerParticle: function(el) { this.particles.push(el); },

            tick: function(t, dt) {
                this.time += dt * 0.001;
                this.drones.forEach((d, i) => {
                    const offset = i * 2;
                    d.object3D.position.x += Math.cos(this.time + offset) * 0.08;
                    d.object3D.position.z += Math.sin(this.time + offset) * 0.08;
                });
                
                this.citizens.forEach((c, i) => {
                    // Stop moving if they have been killed
                    if (!c.isDead) {
                        const speed = 0.02 + (i % 8) * 0.005;
                        c.object3D.position.z -= speed;
                        if (c.object3D.position.z < -400) c.object3D.position.z = 400;
                    }
                });

                this.particles.forEach((p) => {
                    p.object3D.position.x -= 1.2;
                    if (p.object3D.position.x < -600) p.object3D.position.x = 600;
                });
            }
        });

        // LOCOMOTION (Left direction, Right throttle)
        AFRAME.registerComponent('finger-locomotion', {
            schema: { baseSpeed: { type: 'number', default: 0.4 }, threshold: { type: 'number', default: 0.035 }, rig: { type: 'selector', default: '#rig' } },
            init: function() {
                this.vector = new THREE.Vector3();
                this.worldVector = new THREE.Vector3();
                this.proximalPos = new THREE.Vector3();
                this.tipPos = new THREE.Vector3();
                this.lookAtPos = new THREE.Vector3();
                this.currentSpeedMultiplier = 1.0;
                this.arrow = document.querySelector('#movement-arrow');
                this.speedText = document.querySelector('#speed-text');
                this.speedRing = document.querySelector('#speed-ring');
            },
            tick: function() {
                const xr = this.el.renderer.xr;
                const session = xr.getSession();
                if (!session) return;
                const frame = this.el.frame;
                const refSpace = xr.getReferenceSpace();

                let leftHand = null;
                let rightHand = null;
                for (let s of session.inputSources) {
                    if (s.hand) {
                        if (s.handedness === 'left') leftHand = s;
                        if (s.handedness === 'right') rightHand = s;
                    }
                }

                // SPEED CONTROL
                if (rightHand) {
                    const rWrist = rightHand.hand.get('wrist');
                    const rWristPose = frame.getJointPose(rWrist, refSpace);
                    if (rWristPose) {
                        const quat = new THREE.Quaternion(rWristPose.transform.orientation.x, rWristPose.transform.orientation.y, rWristPose.transform.orientation.z, rWristPose.transform.orientation.w);
                        const euler = new THREE.Euler().setFromQuaternion(quat);
                        let tilt = euler.z; 
                        this.currentSpeedMultiplier = THREE.MathUtils.clamp(1.0 + (tilt * 1.5), 0.2, 4.0);
                    }
                }

                // Update UI
                if (this.speedText) this.speedText.setAttribute('value', this.currentSpeedMultiplier.toFixed(1) + 'x');
                if (this.speedRing) {
                    const angle = (this.currentSpeedMultiplier / 4.0) * 360;
                    this.speedRing.setAttribute('geometry', 'thetaLength', angle);
                    let ringColor = '#00ff00';
                    if (this.currentSpeedMultiplier > 2.5) ringColor = '#ff2222';
                    else if (this.currentSpeedMultiplier > 1.3) ringColor = '#ffaa00';
                    this.speedRing.setAttribute('material', 'color', ringColor);
                }

                // DIRECTION CONTROL & COLLISION (Bunker removed, flat collision floor)
                if (!leftHand) { this.stop(); return; }
                const pJoint = leftHand.hand.get('index-finger-phalanx-proximal');
                const tJoint = leftHand.hand.get('index-finger-tip');
                const pPose = frame.getJointPose(pJoint, refSpace);
                const tPose = frame.getJointPose(tJoint, refSpace);

                if (pPose && tPose) {
                    this.proximalPos.set(pPose.transform.position.x, pPose.transform.position.y, pPose.transform.position.z);
                    this.tipPos.set(tPose.transform.position.x, tPose.transform.position.y, tPose.transform.position.z);
                    
                    if (this.proximalPos.distanceTo(this.tipPos) > this.data.threshold) {
                        this.vector.subVectors(this.tipPos, this.proximalPos).normalize();
                        const speed = this.data.baseSpeed * this.currentSpeedMultiplier;
                        this.worldVector.copy(this.vector).applyQuaternion(this.data.rig.object3D.quaternion).multiplyScalar(speed);
                        
                        const n = this.data.rig.object3D.position.clone().add(this.worldVector);
                        
                        // Strict flat ground collision everywhere
                        if (n.y < 0.2) n.y = 0.2;
                        
                        this.data.rig.object3D.position.copy(n);
                        this.updateArrow(this.tipPos, this.vector);
                    } else { this.stop(); }
                } else { this.stop(); }
            },
            updateArrow: function(pos, dir) {
                if (!this.arrow) return;
                this.arrow.setAttribute('visible', 'true');
                this.arrow.object3D.position.copy(pos).addScaledVector(dir, 0.1);
                this.lookAtPos.copy(this.arrow.object3D.position).add(dir);
                this.arrow.object3D.lookAt(this.lookAtPos);
                const speedColor = this.currentSpeedMultiplier > 1.5 ? "#ff00ff" : "#00ff00";
                this.arrow.querySelector('a-cone').setAttribute('material', 'color', speedColor);
            },
            stop: function() { if (this.arrow) this.arrow.setAttribute('visible', 'false'); }
        });

        // COMBAT SYSTEM: Gesture detection and Auto-aim shooting
        AFRAME.registerComponent('combat-system', {
            init: function() {
                this.rig = document.querySelector('#rig');
                this.rightHand = document.querySelector('#right-hand');
                this.speedometerUI = document.querySelector('#speedometer-ui');
                this.gunModel = document.querySelector('#gun-model');
                this.bulletLine = document.querySelector('#bullet-line');
                this.sys = this.el.components['dystopian-system'];
                this.audioCtx = null;
                this.gunVisibleTimer = 0;

                // Fire event on pinch
                this.rightHand.addEventListener('pinchstarted', () => {
                    if (this.gunVisibleTimer > 0) {
                        this.fireGun();
                    }
                });
            },
            tick: function(t, dt) {
                const xr = this.el.sceneEl.renderer.xr;
                const session = xr.getSession();
                if (!session) return;
                const frame = this.el.sceneEl.frame;
                const refSpace = xr.getReferenceSpace();

                let rHandSource = null;
                for (let s of session.inputSources) if (s.handedness === 'right' && s.hand) rHandSource = s;
                if (!rHandSource) return;

                // Are we on the ground?
                const isGround = this.rig.object3D.position.y < 3.0;
                let isGunPose = false;

                // Detect Gun Gesture: Index finger extended, middle finger curled
                const wrist = rHandSource.hand.get('wrist');
                const iTip = rHandSource.hand.get('index-finger-tip');
                const mTip = rHandSource.hand.get('middle-finger-tip');

                const wPose = frame.getJointPose(wrist, refSpace);
                const iPose = frame.getJointPose(iTip, refSpace);
                const mPose = frame.getJointPose(mTip, refSpace);

                if (wPose && iPose && mPose) {
                    const dIndex = Math.hypot(iPose.transform.position.x - wPose.transform.position.x, iPose.transform.position.y - wPose.transform.position.y, iPose.transform.position.z - wPose.transform.position.z);
                    const dMiddle = Math.hypot(mPose.transform.position.x - wPose.transform.position.x, mPose.transform.position.y - wPose.transform.position.y, mPose.transform.position.z - wPose.transform.position.z);
                    
                    if (dIndex > 0.12 && dMiddle < 0.10) {
                        isGunPose = true;
                    }
                }

                // Grace period timer so pinch doesn't instantly hide the gun
                if (isGround && isGunPose) {
                    this.gunVisibleTimer = 0.3; // Hold visibility for 0.3s
                } else {
                    this.gunVisibleTimer -= dt * 0.001;
                }

                if (this.gunVisibleTimer > 0) {
                    this.gunModel.setAttribute('visible', 'true');
                    this.speedometerUI.setAttribute('visible', 'false');
                } else {
                    this.gunModel.setAttribute('visible', 'false');
                    this.speedometerUI.setAttribute('visible', 'true');
                }
            },
            fireGun: function() {
                this.playPewSound();

                let closestCit = null;
                let minDist = Infinity;
                const handPos = new THREE.Vector3();
                this.rightHand.object3D.getWorldPosition(handPos);

                // Auto-aim logic
                this.sys.citizens.forEach(c => {
                    if (c.isDead) return;
                    const cPos = new THREE.Vector3();
                    c.object3D.getWorldPosition(cPos);
                    const d = handPos.distanceTo(cPos);
                    // Hit radius 120 units
                    if (d < minDist && d < 120) {
                        minDist = d;
                        closestCit = c;
                    }
                });

                if (closestCit) {
                    // Mark dead
                    closestCit.isDead = true;
                    
                    // Death Animation: Fall flat on the face
                    closestCit.setAttribute('animation__rot', 'property: rotation; to: -90 0 0; dur: 250; easing: easeInQuad');
                    closestCit.setAttribute('animation__pos', 'property: position; to: ' + closestCit.object3D.position.x + ' 0.2 ' + closestCit.object3D.position.z + '; dur: 250; easing: easeInQuad');

                    const targetPos = new THREE.Vector3();
                    closestCit.object3D.getWorldPosition(targetPos);
                    targetPos.y += 1.0; // Aim at chest

                    // Render Bullet Tracer
                    this.bulletLine.setAttribute('line', `start: ${handPos.x} ${handPos.y} ${handPos.z}; end: ${targetPos.x} ${targetPos.y} ${targetPos.z}; color: #ffaa00; visible: true`);
                    
                    this.playHitSound();

                    // Hide bullet after a frame
                    setTimeout(() => {
                        this.bulletLine.setAttribute('line', 'visible: false');
                    }, 80);
                }
            },
            playPewSound: function() {
                if(!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(this.audioCtx.state === 'suspended') this.audioCtx.resume();
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.connect(gain); gain.connect(this.audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(600, this.audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.4, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(this.audioCtx.currentTime + 0.15);
            },
            playHitSound: function() {
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.connect(gain); gain.connect(this.audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, this.audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.6, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(this.audioCtx.currentTime + 0.1);
            }
        });

        AFRAME.registerComponent('mega-world-gen', {
            init: function() {
                const scene = this.el;
                const sys = scene.components['dystopian-system'];

                for (let i = 0; i < 400; i++) {
                    const x = (Math.random() - 0.5) * 1600;
                    const z = (Math.random() - 0.5) * 1600;
                    if (Math.abs(x) < 100 && z < 220) continue; 
                    const tower = document.createElement('a-entity');
                    tower.setAttribute('position', `${x} 0 ${z}`);
                    const h = 100 + Math.random() * 300;
                    const w = 25 + Math.random() * 40;
                    const core = document.createElement('a-box');
                    core.setAttribute('width', w); core.setAttribute('height', h); core.setAttribute('depth', w);
                    core.setAttribute('position', `0 ${h/2} 0`);
                    core.setAttribute('color', `hsl(${220+Math.random()*20}, 10%, ${2+Math.random()*6}%)`);
                    tower.appendChild(core);
                    
                    for(let j=0; j<6; j++) {
                        const pipe = document.createElement('a-cylinder');
                        pipe.setAttribute('radius', '0.6'); pipe.setAttribute('height', h);
                        pipe.setAttribute('position', `${(Math.random()-0.5)*w} ${h/2} ${(Math.random()-0.5)*w}`);
                        pipe.setAttribute('color', '#050505');
                        tower.appendChild(pipe);
                    }
                    scene.appendChild(tower);
                }

                for (let i = 0; i < 1500; i++) {
                    const x = (Math.random() - 0.5) * 1000;
                    const z = (Math.random() - 0.5) * 1000;
                    if (Math.abs(x) < 70 && z < 150) continue; 
                    const slum = document.createElement('a-box');
                    const sw = 8 + Math.random() * 15;
                    const sh = 1 + Math.random() * 6;
                    const sd = 8 + Math.random() * 15;
                    slum.setAttribute('width', sw); slum.setAttribute('height', sh); slum.setAttribute('depth', sd);
                    slum.setAttribute('position', `${x} ${sh/2} ${z}`);
                    slum.setAttribute('color', `hsl(${25+Math.random()*15}, 15%, ${4+Math.random()*8}%)`);
                    scene.appendChild(slum);
                }

                for (let i = 0; i < 80; i++) {
                    const drone = document.createElement('a-entity');
                    drone.setAttribute('position', `${(Math.random()-0.5)*600} ${40+Math.random()*30} ${(Math.random()-0.5)*600}`);
                    const dBox = document.createElement('a-box');
                    dBox.setAttribute('scale', '3 0.6 3'); dBox.setAttribute('color', '#000');
                    drone.appendChild(dBox);
                    const beam = document.createElement('a-cone');
                    beam.setAttribute('radius-bottom', '12'); beam.setAttribute('height', '45'); beam.setAttribute('position', '0 -22 0');
                    beam.setAttribute('material', 'shader: flat; color: #ff0000; transparent: true; opacity: 0.12');
                    drone.appendChild(beam);
                    scene.appendChild(drone);
                    sys.registerDrone(drone);
                }

                for (let i = 0; i < 500; i++) {
                    const cit = document.createElement('a-entity');
                    cit.setAttribute('position', `${(Math.random()-0.5)*400} 0 ${(Math.random()-0.5)*600}`);
                    const body = document.createElement('a-cylinder');
                    body.setAttribute('radius', '0.25'); body.setAttribute('height', '1.4'); body.setAttribute('color', '#050505');
                    cit.appendChild(body);
                    scene.appendChild(cit);
                    sys.registerCitizen(cit);
                }
            }
        });
    </script>
</head>
<body>
    <a-scene 
        dystopian-system
        finger-locomotion 
        combat-system
        mega-world-gen 
        fog="type: exponential; color: #1a0204; density: 0.006"
        background="color: #000000">
        
        <a-light type="ambient" color="#1a1a25" intensity="0.3"></a-light>
        <a-light type="directional" color="#ff1100" position="-1 0.7 -1" intensity="2.0"></a-light>

        <!-- Dynamic Bullet Tracer (Moved dynamically by combat-system) -->
        <a-entity id="bullet-line" line="color: #ffaa00; visible: false" position="0 0 0"></a-entity>

        <!-- GLOWING RED MOON -->
        <a-entity position="-400 600 -900">
            <a-sphere radius="140" material="shader: flat; color: #ff0000"></a-sphere>
            <a-sphere radius="160" material="shader: flat; color: #ff0000; transparent: true; opacity: 0.3" side="back"></a-sphere>
            <a-sphere radius="200" material="shader: flat; color: #ff0000; transparent: true; opacity: 0.1" side="back"></a-sphere>
            <a-light type="point" color="#ff0000" intensity="3" distance="2000"></a-light>
        </a-entity>

        <a-plane rotation="-90 0 0" width="5000" height="5000" color="#010101"></a-plane>
        
        <!-- Platforms -->
        <a-box position="0 5 40" width="40" height="10" depth="40" color="#0a0a0f"></a-box>

        <!-- FUTURISTIC START SIGN -->
        <a-entity position="0 11.5 35">
            <a-plane width="7" height="3.5" color="#050505" material="opacity: 0.85; transparent: true; shader: flat; side: double" position="0 0 -0.05"></a-plane>
            <a-plane width="7.1" height="3.6" color="#ff0000" material="opacity: 0.4; transparent: true; shader: flat; side: double" position="0 0 -0.06"></a-plane>
            <a-text value="HEIL MISTER" position="0 1 0" align="center" color="#ff2222" scale="2.5 2.5 2.5" font="monoid"></a-text>
            <a-text value="Sector 4 - Hyper-Dense Dystopian Megacity\nWelcome, Citizen. The Monolith sees all." position="0 0.1 0" align="center" color="#aaaaaa" scale="0.9 0.9 0.9"></a-text>
            <a-text value="MOVEMENT PROTOCOL:\n[ LEFT HAND ] Point index finger to glide forward.\n[ RIGHT HAND ] Tilt left/right to adjust throttle.\n\nCOMBAT PROTOCOL:\n[ ON GROUND ] Make 'Gun' gesture. Pinch to shoot." position="0 -0.9 0" align="center" color="#00ffaa" scale="0.8 0.8 0.8" line-height="60"></a-text>
        </a-entity>

        <!-- MONOLITH -->
        <a-entity position="0 0 -60">
            <a-box width="22" height="100" depth="22" position="0 50 0" color="#000"></a-box>
            <a-box width="10" height="2" depth="2" position="0 90 11.1" material="shader: flat; color: #f00"></a-box>
        </a-entity>

        <!-- PLAYER RIG -->
        <a-entity id="rig" position="0 10.1 40">
            <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-camera>
            
            <a-entity hand-tracking-controls="hand: left; modelStyle: mesh; modelColor: #000;"></a-entity>
            
            <a-entity id="right-hand" hand-tracking-controls="hand: right; modelStyle: mesh; modelColor: #000;">
                
                <!-- Right Hand Speedometer UI -->
                <a-entity id="speedometer-ui" position="-0.06 0.05 0.05" rotation="-45 -20 0">
                    <a-ring id="speed-ring" radius-inner="0.035" radius-outer="0.045" material="color: #00ff00; shader: flat; side: double" geometry="thetaLength: 90"></a-ring>
                    <a-ring radius-inner="0.046" radius-outer="0.048" material="color: #333; shader: flat; side: double"></a-ring>
                    <a-text id="speed-text" value="1.0x" align="center" position="0 0 0" scale="0.12 0.12 0.12" color="#ffffff"></a-text>
                    <a-text value="SPD" align="center" position="0 -0.05 0" scale="0.06 0.06 0.06" color="#aaaaaa"></a-text>
                </a-entity>

                <!-- Holographic Gun Model (Visible only on ground in Gun Pose) -->
                <a-entity id="gun-model" visible="false">
                    <!-- Gun Barrel -->
                    <a-box width="0.03" height="0.03" depth="0.2" position="0 -0.01 -0.08" color="#333" material="metalness: 0.9; roughness: 0.2"></a-box>
                    <!-- Gun Handle -->
                    <a-box width="0.035" height="0.1" depth="0.035" position="0 -0.06 -0.01" rotation="20 0 0" color="#111" material="metalness: 0.5"></a-box>
                    <!-- Energy Glow -->
                    <a-box width="0.031" height="0.031" depth="0.1" position="0 -0.01 -0.08" material="shader: flat; color: #ff0000; transparent: true; opacity: 0.5"></a-box>
                </a-entity>

            </a-entity>
            
            <a-entity id="movement-arrow" visible="false">
                <a-cone radius-bottom="0.03" radius-top="0" height="0.25" rotation="90 0 0" material="shader: flat"></a-cone>
            </a-entity>
        </a-entity>

    </a-scene>
</body>
</html>
