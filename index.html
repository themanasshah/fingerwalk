<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyper-Realistic Dystopian Megacity - Ultra Detail</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <script>
        // THUNDER & LIGHTNING SYSTEM
        AFRAME.registerComponent('thunder-system', {
            init: function() {
                this.flashLight = document.querySelector('#thunder-light');
                this.timer = Math.random() * 4 + 3;
                this.audioCtx = null;
            },
            tick: function(t, dt) {
                this.timer -= dt * 0.001;
                if (this.timer <= 0) {
                    this.strike();
                    this.timer = Math.random() * 8 + 6; // 6 to 14 seconds between strikes
                }
            },
            strike: function() {
                // Global Environment Flash (Brighter ambient burst)
                this.flashLight.setAttribute('intensity', '6');
                setTimeout(() => this.flashLight.setAttribute('intensity', '0'), 50);
                setTimeout(() => this.flashLight.setAttribute('intensity', '3'), 150);
                setTimeout(() => this.flashLight.setAttribute('intensity', '0'), 250);
                setTimeout(() => this.flashLight.setAttribute('intensity', '2'), 400);
                setTimeout(() => this.flashLight.setAttribute('intensity', '0'), 600);
                
                // Audio Synthesis for deep rolling Thunder
                if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                
                const bufferSize = this.audioCtx.sampleRate * 4.0;
                const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noiseSource = this.audioCtx.createBufferSource();
                noiseSource.buffer = buffer;
                
                const filter = this.audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(150, this.audioCtx.currentTime); 
                filter.frequency.linearRampToValueAtTime(700, this.audioCtx.currentTime + 0.2); 
                filter.frequency.exponentialRampToValueAtTime(40, this.audioCtx.currentTime + 3.0); 
                filter.Q.value = 1.0;

                const gain = this.audioCtx.createGain();
                gain.gain.setValueAtTime(0, this.audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(2.5, this.audioCtx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.6, this.audioCtx.currentTime + 0.3);
                gain.gain.linearRampToValueAtTime(1.0, this.audioCtx.currentTime + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 4.0);
                
                noiseSource.connect(filter);
                filter.connect(gain);
                gain.connect(this.audioCtx.destination);
                noiseSource.start();
            }
        });

        // GLOBAL ANIMATION SYSTEM
        AFRAME.registerComponent('dystopian-system', {
            init: function() {
                this.drones = [];
                this.citizens = [];
                this.particles = [];
                this.time = 0;
            },
            registerDrone: function(el) { this.drones.push(el); },
            registerCitizen: function(el) { this.citizens.push(el); },
            registerParticle: function(el) { this.particles.push(el); },

            tick: function(t, dt) {
                this.time += dt * 0.001;
                this.drones.forEach((d, i) => {
                    const offset = i * 2.5;
                    d.object3D.position.x += Math.cos(this.time + offset) * 0.09;
                    d.object3D.position.z += Math.sin(this.time + offset) * 0.09;
                });
                
                this.citizens.forEach((c, i) => {
                    if (!c.isDead) {
                        const speed = 0.015 + (i % 6) * 0.005;
                        c.object3D.position.z -= speed;
                        if (c.object3D.position.z < -400) c.object3D.position.z = 400;
                    }
                });

                this.particles.forEach((p) => {
                    p.object3D.position.x -= 1.8;
                    if (p.object3D.position.x < -600) p.object3D.position.x = 600;
                });
            }
        });

        // LOCOMOTION
        AFRAME.registerComponent('finger-locomotion', {
            schema: { baseSpeed: { type: 'number', default: 0.45 }, threshold: { type: 'number', default: 0.035 }, rig: { type: 'selector', default: '#rig' } },
            init: function() {
                this.vector = new THREE.Vector3();
                this.worldVector = new THREE.Vector3();
                this.proximalPos = new THREE.Vector3();
                this.tipPos = new THREE.Vector3();
                this.lookAtPos = new THREE.Vector3();
                this.currentSpeedMultiplier = 1.0;
                this.arrow = document.querySelector('#movement-arrow');
                this.speedText = document.querySelector('#speed-text');
                this.speedRing = document.querySelector('#speed-ring');
            },
            tick: function() {
                const xr = this.el.renderer.xr;
                const session = xr.getSession();
                if (!session) return;
                const frame = this.el.frame;
                const refSpace = xr.getReferenceSpace();

                let leftHand = null;
                let rightHand = null;
                for (let s of session.inputSources) {
                    if (s.hand) {
                        if (s.handedness === 'left') leftHand = s;
                        if (s.handedness === 'right') rightHand = s;
                    }
                }

                if (rightHand) {
                    const rWrist = rightHand.hand.get('wrist');
                    const rWristPose = frame.getJointPose(rWrist, refSpace);
                    if (rWristPose) {
                        const quat = new THREE.Quaternion(rWristPose.transform.orientation.x, rWristPose.transform.orientation.y, rWristPose.transform.orientation.z, rWristPose.transform.orientation.w);
                        const euler = new THREE.Euler().setFromQuaternion(quat);
                        let tilt = euler.z; 
                        this.currentSpeedMultiplier = THREE.MathUtils.clamp(1.0 + (tilt * 1.5), 0.2, 4.0);
                    }
                }

                if (this.speedText) this.speedText.setAttribute('value', this.currentSpeedMultiplier.toFixed(1) + 'x');
                if (this.speedRing) {
                    const angle = (this.currentSpeedMultiplier / 4.0) * 360;
                    this.speedRing.setAttribute('geometry', 'thetaLength', angle);
                    let ringColor = '#00ff00';
                    if (this.currentSpeedMultiplier > 2.5) ringColor = '#ff2222';
                    else if (this.currentSpeedMultiplier > 1.3) ringColor = '#ffaa00';
                    this.speedRing.setAttribute('material', 'color', ringColor);
                }

                if (!leftHand) { this.stop(); return; }
                const pJoint = leftHand.hand.get('index-finger-phalanx-proximal');
                const tJoint = leftHand.hand.get('index-finger-tip');
                const pPose = frame.getJointPose(pJoint, refSpace);
                const tPose = frame.getJointPose(tJoint, refSpace);

                if (pPose && tPose) {
                    this.proximalPos.set(pPose.transform.position.x, pPose.transform.position.y, pPose.transform.position.z);
                    this.tipPos.set(tPose.transform.position.x, tPose.transform.position.y, tPose.transform.position.z);
                    
                    if (this.proximalPos.distanceTo(this.tipPos) > this.data.threshold) {
                        this.vector.subVectors(this.tipPos, this.proximalPos).normalize();
                        const speed = this.data.baseSpeed * this.currentSpeedMultiplier;
                        this.worldVector.copy(this.vector).applyQuaternion(this.data.rig.object3D.quaternion).multiplyScalar(speed);
                        
                        const n = this.data.rig.object3D.position.clone().add(this.worldVector);
                        if (n.y < 0.2) n.y = 0.2; // Floor collision ensures smooth ground walking
                        
                        this.data.rig.object3D.position.copy(n);
                        this.updateArrow(this.tipPos, this.vector);
                    } else { this.stop(); }
                } else { this.stop(); }
            },
            updateArrow: function(pos, dir) {
                if (!this.arrow) return;
                this.arrow.setAttribute('visible', 'true');
                this.arrow.object3D.position.copy(pos).addScaledVector(dir, 0.1);
                this.lookAtPos.copy(this.arrow.object3D.position).add(dir);
                this.arrow.object3D.lookAt(this.lookAtPos);
            },
            stop: function() { if (this.arrow) this.arrow.setAttribute('visible', 'false'); }
        });

        // COMBAT SYSTEM (Vision Aim & Gestures)
        AFRAME.registerComponent('combat-system', {
            init: function() {
                this.rig = document.querySelector('#rig');
                this.camera = document.querySelector('a-camera');
                this.rightHand = document.querySelector('#right-hand');
                this.speedometerUI = document.querySelector('#speedometer-ui');
                this.gunModel = document.querySelector('#gun-model');
                this.bulletLine = document.querySelector('#bullet-line');
                this.sys = this.el.components['dystopian-system'];
                this.audioCtx = null;
                this.gunVisibleTimer = 0;

                this.rightHand.addEventListener('pinchstarted', () => {
                    if (this.gunVisibleTimer > 0) this.fireGun();
                });
            },
            tick: function(t, dt) {
                const xr = this.el.sceneEl.renderer.xr;
                const session = xr.getSession();
                if (!session) return;
                const frame = this.el.sceneEl.frame;
                const refSpace = xr.getReferenceSpace();

                let rHandSource = null;
                for (let s of session.inputSources) if (s.handedness === 'right' && s.hand) rHandSource = s;
                if (!rHandSource) return;

                const isGround = this.rig.object3D.position.y < 3.0;
                let isGunPose = false;

                const wrist = rHandSource.hand.get('wrist');
                const iTip = rHandSource.hand.get('index-finger-tip');
                const mTip = rHandSource.hand.get('middle-finger-tip');
                const wPose = frame.getJointPose(wrist, refSpace);
                const iPose = frame.getJointPose(iTip, refSpace);
                const mPose = frame.getJointPose(mTip, refSpace);

                if (wPose && iPose && mPose) {
                    const dIndex = Math.hypot(iPose.transform.position.x - wPose.transform.position.x, iPose.transform.position.y - wPose.transform.position.y, iPose.transform.position.z - wPose.transform.position.z);
                    const dMiddle = Math.hypot(mPose.transform.position.x - wPose.transform.position.x, mPose.transform.position.y - wPose.transform.position.y, mPose.transform.position.z - wPose.transform.position.z);
                    
                    if (dIndex > 0.10 && dMiddle < 0.08) isGunPose = true;
                }

                if (isGround && isGunPose) {
                    this.gunVisibleTimer = 0.3; 
                } else {
                    this.gunVisibleTimer -= dt * 0.001;
                }

                if (this.gunVisibleTimer > 0) {
                    this.gunModel.setAttribute('visible', 'true');
                    this.speedometerUI.setAttribute('visible', 'false');
                } else {
                    this.gunModel.setAttribute('visible', 'false');
                    this.speedometerUI.setAttribute('visible', 'true');
                }
            },
            fireGun: function() {
                this.playPewSound();

                let closestCit = null;
                let minDist = Infinity;
                
                const camPos = new THREE.Vector3();
                this.camera.object3D.getWorldPosition(camPos);
                const camDir = new THREE.Vector3();
                this.camera.object3D.getWorldDirection(camDir);
                camDir.multiplyScalar(-1); 

                const handPos = new THREE.Vector3();
                this.rightHand.object3D.getWorldPosition(handPos);

                this.sys.citizens.forEach(c => {
                    if (c.isDead) return;
                    
                    const cPos = new THREE.Vector3();
                    c.object3D.getWorldPosition(cPos);
                    
                    const toCit = new THREE.Vector3().subVectors(cPos, camPos);
                    const dist = toCit.length();
                    toCit.normalize();
                    
                    const angle = camDir.angleTo(toCit);
                    
                    if (angle < 0.45 && dist < minDist && dist < 150) {
                        minDist = dist;
                        closestCit = c;
                    }
                });

                if (closestCit) {
                    closestCit.isDead = true;
                    closestCit.setAttribute('animation__rot', 'property: rotation; to: -90 0 0; dur: 300; easing: easeInQuad');
                    closestCit.setAttribute('animation__pos', 'property: position; to: ' + closestCit.object3D.position.x + ' 0.2 ' + closestCit.object3D.position.z + '; dur: 300; easing: easeInQuad');

                    const targetPos = new THREE.Vector3();
                    closestCit.object3D.getWorldPosition(targetPos);
                    targetPos.y += 1.0; 

                    this.bulletLine.setAttribute('line', `start: ${handPos.x} ${handPos.y} ${handPos.z}; end: ${targetPos.x} ${targetPos.y} ${targetPos.z}; color: #ff0000; visible: true`);
                    this.playHitSound();

                    setTimeout(() => { this.bulletLine.setAttribute('line', 'visible: false'); }, 60);
                }
            },
            playPewSound: function() {
                if(!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(this.audioCtx.state === 'suspended') this.audioCtx.resume();
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.connect(gain); gain.connect(this.audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(900, this.audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.6, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(this.audioCtx.currentTime + 0.15);
            },
            playHitSound: function() {
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.connect(gain); gain.connect(this.audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, this.audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.9, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(this.audioCtx.currentTime + 0.1);
            }
        });

        AFRAME.registerComponent('realistic-world-gen', {
            init: function() {
                const scene = this.el;
                const sys = scene.components['dystopian-system'];

                // 1. MEGA TOWER GENERATOR
                for (let i = 0; i < 550; i++) {
                    const x = (Math.random() - 0.5) * 1800;
                    const z = (Math.random() - 0.5) * 1800;
                    
                    // Reduced exclusion zone so buildings crowd the spawn area tightly
                    const distFromCenter = Math.hypot(x, z - 20);
                    if (distFromCenter < 50) continue; 
                    
                    const tower = document.createElement('a-entity');
                    tower.setAttribute('position', `${x} 0 ${z}`);
                    
                    const isRusty = Math.random() > 0.8;
                    const hue = isRusty ? Math.random() * 40 : 190 + Math.random() * 50;
                    const sat = 15 + Math.random() * 25;
                    const lit = 8 + Math.random() * 25; 
                    const bColor = `hsl(${hue}, ${sat}%, ${lit}%)`;

                    const tiers = Math.floor(Math.random() * 4) + 1;
                    let currentY = 0;
                    let currentW = 20 + Math.random() * 35;
                    let currentD = currentW * (0.8 + Math.random() * 0.4);
                    
                    for(let t = 0; t < tiers; t++) {
                        const tierH = 80 + Math.random() * 180;
                        const isCyl = Math.random() > 0.85 && t > 0;
                        
                        const part = document.createElement(isCyl ? 'a-cylinder' : 'a-box');
                        part.setAttribute('color', bColor);
                        part.setAttribute('material', 'metalness: 0.8; roughness: 0.35');
                        
                        if(isCyl) {
                            part.setAttribute('radius', currentW / 2);
                            part.setAttribute('height', tierH);
                        } else {
                            part.setAttribute('width', currentW); 
                            part.setAttribute('height', tierH); 
                            part.setAttribute('depth', currentD);
                        }
                        part.setAttribute('position', `0 ${currentY + tierH/2} 0`);
                        tower.appendChild(part);

                        // Structural Ribs / Metal Plates (Oversized to prevent Z-fighting)
                        if (!isCyl) {
                            const ribCount = Math.floor(tierH / 30);
                            for(let r=0; r<ribCount; r++) {
                                const plate = document.createElement('a-box');
                                // Oversize width/depth by 0.5 to stop z-fighting completely
                                plate.setAttribute('width', currentW + 0.5); 
                                plate.setAttribute('height', 1.5 + Math.random() * 3); 
                                plate.setAttribute('depth', currentD + 0.5);
                                plate.setAttribute('position', `0 ${currentY + (r * 30) + 15} 0`);
                                plate.setAttribute('color', '#151515');
                                plate.setAttribute('material', 'metalness: 0.95; roughness: 0.2');
                                tower.appendChild(plate);
                            }

                            // Vents / AC Units attached to the side
                            const ventCount = Math.floor(Math.random() * 5);
                            for (let v=0; v<ventCount; v++) {
                                const vent = document.createElement('a-box');
                                vent.setAttribute('width', 2); vent.setAttribute('height', 3); vent.setAttribute('depth', 2);
                                const sideX = Math.random() > 0.5 ? (currentW/2 + 0.5) : -(currentW/2 + 0.5);
                                vent.setAttribute('position', `${sideX} ${currentY + Math.random() * tierH} 0`);
                                vent.setAttribute('color', '#0a0a0a');
                                tower.appendChild(vent);
                            }
                            
                            // Neon Accents
                            if (Math.random() > 0.7) {
                                const neon = document.createElement('a-box');
                                neon.setAttribute('width', 0.8); neon.setAttribute('height', tierH * 0.6); neon.setAttribute('depth', currentD + 1.0);
                                neon.setAttribute('position', `0 ${currentY + tierH/2} 0`);
                                neon.setAttribute('material', `shader: flat; color: ${Math.random() > 0.5 ? '#ff1111' : '#1111ff'}`);
                                tower.appendChild(neon);
                            }
                        }

                        currentY += tierH;
                        currentW *= (0.6 + Math.random() * 0.3); 
                        currentD *= (0.6 + Math.random() * 0.3);
                    }

                    // Vertical Industrial Pipes (Oversized placement)
                    const pipeCount = Math.floor(Math.random() * 4) + 1;
                    for(let j=0; j<pipeCount; j++) {
                        const pipe = document.createElement('a-cylinder');
                        pipe.setAttribute('radius', '0.8'); pipe.setAttribute('height', currentY);
                        // Place pipes slightly outside the main box boundary to avoid clipping
                        const px = (j%2 === 0) ? (currentW/2 + 1.2) : -(currentW/2 + 1.2);
                        const pz = (j < 2) ? (currentD/2 + 1.2) : -(currentD/2 + 1.2);
                        pipe.setAttribute('position', `${px} ${currentY/2} ${pz}`);
                        pipe.setAttribute('color', '#080808');
                        pipe.setAttribute('material', 'metalness: 0.9; roughness: 0.4');
                        tower.appendChild(pipe);
                    }
                    scene.appendChild(tower);
                }

                // 2. ULTRA DENSE SLUMS
                for (let i = 0; i < 1500; i++) {
                    const x = (Math.random() - 0.5) * 1200;
                    const z = (Math.random() - 0.5) * 1200;
                    if (Math.hypot(x, z - 20) < 45) continue; 
                    const slum = document.createElement('a-box');
                    const sw = 6 + Math.random() * 16;
                    const sh = 1.5 + Math.random() * 6;
                    const sd = 6 + Math.random() * 16;
                    slum.setAttribute('width', sw); slum.setAttribute('height', sh); slum.setAttribute('depth', sd);
                    slum.setAttribute('position', `${x} ${sh/2} ${z}`);
                    slum.setAttribute('color', `hsl(${25+Math.random()*25}, 15%, ${12+Math.random()*15}%)`);
                    slum.setAttribute('material', 'metalness: 0.5; roughness: 0.7');
                    scene.appendChild(slum);
                }

                // 3. GROUND PIPES AND DETAILS
                for (let i = 0; i < 300; i++) {
                    const pipe = document.createElement('a-cylinder');
                    pipe.setAttribute('radius', 0.4 + Math.random() * 0.8); 
                    pipe.setAttribute('height', 15 + Math.random() * 30);
                    pipe.setAttribute('rotation', '90 0 90');
                    pipe.setAttribute('position', `${(Math.random()-0.5)*800} 0.5 ${(Math.random()-0.5)*800}`);
                    pipe.setAttribute('color', '#111');
                    pipe.setAttribute('material', 'metalness: 0.9; roughness: 0.3');
                    scene.appendChild(pipe);
                }

                // 4. THUNDERING CLOUDS
                for (let i = 0; i < 45; i++) {
                    const cloud = document.createElement('a-icosahedron');
                    cloud.setAttribute('radius', '70');
                    cloud.setAttribute('scale', '3 0.4 2');
                    cloud.setAttribute('position', `${(Math.random()-0.5)*1500} ${400 + Math.random()*150} ${(Math.random()-0.5)*1500}`);
                    cloud.setAttribute('color', '#050505');
                    cloud.setAttribute('material', 'flatShading: true; roughness: 1');
                    scene.appendChild(cloud);
                }

                // 5. INTERESTING CYBORG CITIZENS
                for (let i = 0; i < 500; i++) {
                    const cit = document.createElement('a-entity');
                    cit.setAttribute('position', `${(Math.random()-0.5)*400} 0 ${(Math.random()-0.5)*600}`);
                    
                    const body = document.createElement('a-cone');
                    body.setAttribute('radius-bottom', '0.35'); body.setAttribute('radius-top', '0.1'); body.setAttribute('height', '1.4'); 
                    body.setAttribute('position', '0 0.7 0');
                    body.setAttribute('color', '#151515');
                    
                    const head = document.createElement('a-sphere');
                    head.setAttribute('radius', '0.15'); head.setAttribute('position', '0 1.55 0'); head.setAttribute('color', '#050505');
                    
                    const visor = document.createElement('a-box');
                    visor.setAttribute('width', '0.22'); visor.setAttribute('height', '0.04'); visor.setAttribute('depth', '0.18'); 
                    visor.setAttribute('position', '0 1.55 0.05');
                    visor.setAttribute('material', 'shader: flat; color: #ff0000');
                    
                    cit.appendChild(body); cit.appendChild(head); cit.appendChild(visor);
                    scene.appendChild(cit);
                    sys.registerCitizen(cit);
                }
            }
        });
    </script>
</head>
<body>
    <a-scene 
        dystopian-system
        thunder-system
        finger-locomotion 
        combat-system
        realistic-world-gen 
        fog="type: exponential; color: #0a0a10; density: 0.0035"
        background="color: #020202">
        
        <!-- Brightened Environment Base Lighting -->
        <a-light type="ambient" color="#2a2a35" intensity="0.6"></a-light>
        <a-light type="directional" color="#ff3311" position="-1 0.8 -1" intensity="2.2"></a-light>
        
        <!-- GLOBAL THUNDER FLASH (Ambient to instantly light up the whole city) -->
        <a-light id="thunder-light" type="ambient" color="#ddefaa" intensity="0"></a-light>

        <!-- Dynamic Bullet Tracer -->
        <a-entity id="bullet-line" line="color: #ff0000; visible: false" position="0 0 0"></a-entity>

        <a-plane rotation="-90 0 0" width="5000" height="5000" color="#0a0a0a" material="roughness: 0.6; metalness: 0.3"></a-plane>
        
        <!-- Platform -->
        <a-box position="0 5 40" width="40" height="10" depth="40" color="#111115" material="metalness: 0.8; roughness: 0.4"></a-box>

        <!-- START SIGN (Forced Monoid Font everywhere) -->
        <a-entity position="0 11.5 35">
            <a-plane width="9" height="4" color="#050505" material="opacity: 0.85; transparent: true; shader: flat; side: double" position="0 0 -0.05"></a-plane>
            <a-plane width="9.1" height="4.1" color="#ff0000" material="opacity: 0.4; transparent: true; shader: flat; side: double" position="0 0 -0.06"></a-plane>
            <a-text value="HEIL MISTER" font="monoid" position="0 1.2 0" align="center" color="#ff2222" scale="2.5 2.5 2.5"></a-text>
            <a-text value="Sector 4 - Hyper-Dense Dystopian Megacity\nWelcome, Citizen. The Monolith sees all." font="monoid" position="0 0.3 0" align="center" color="#aaaaaa" scale="0.9 0.9 0.9"></a-text>
            <a-text value="MOVEMENT:\n[ LEFT ] Point to glide.  [ RIGHT ] Tilt to throttle.\n\nCOMBAT:\n[ ON GROUND ] Make 'Gun' sign. Pinch to execute in vision." font="monoid" position="0 -0.8 0" align="center" color="#00ffaa" scale="0.8 0.8 0.8" line-height="50"></a-text>
        </a-entity>

        <!-- MONOLITH -->
        <a-entity position="0 0 -50">
            <a-box width="24" height="120" depth="24" position="0 60 0" color="#050505" material="metalness: 0.9; roughness: 0.15"></a-box>
            <!-- Visor -->
            <a-box width="12" height="2" depth="2" position="0 110 12.1" material="shader: flat; color: #f00"></a-box>
            <!-- Monolith detail pipes -->
            <a-cylinder radius="1.2" height="120" position="12.5 60 12.5" color="#111" material="metalness: 0.9"></a-cylinder>
            <a-cylinder radius="1.2" height="120" position="-12.5 60 12.5" color="#111" material="metalness: 0.9"></a-cylinder>
        </a-entity>

        <!-- PLAYER RIG -->
        <a-entity id="rig" position="0 10.1 40">
            <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-camera>
            
            <a-entity hand-tracking-controls="hand: left; modelStyle: mesh; modelColor: #000;"></a-entity>
            
            <a-entity id="right-hand" hand-tracking-controls="hand: right; modelStyle: mesh; modelColor: #000;">
                
                <!-- VISIBLE SPEEDOMETER UI -->
                <a-entity id="speedometer-ui" position="0 0.08 0.05" rotation="-90 0 0">
                    <a-ring id="speed-ring" radius-inner="0.035" radius-outer="0.045" material="color: #00ff00; shader: flat; side: double" geometry="thetaLength: 90"></a-ring>
                    <a-ring radius-inner="0.046" radius-outer="0.048" material="color: #333; shader: flat; side: double"></a-ring>
                    <a-text id="speed-text" value="1.0x" font="monoid" align="center" position="0 0 0.01" scale="0.12 0.12 0.12" color="#ffffff"></a-text>
                    <a-text value="SPD" font="monoid" align="center" position="0 -0.05 0.01" scale="0.06 0.06 0.06" color="#aaaaaa"></a-text>
                </a-entity>

                <!-- VISIBLE HOLOGRAPHIC GUN -->
                <a-entity id="gun-model" visible="false" position="0 0.05 -0.1">
                    <!-- Gun Barrel -->
                    <a-box width="0.04" height="0.04" depth="0.25" position="0 0 0" color="#222" material="metalness: 0.95; roughness: 0.1"></a-box>
                    <!-- Energy Rails -->
                    <a-box width="0.042" height="0.01" depth="0.22" position="0 0.02 0" material="shader: flat; color: #ff0000; transparent: true; opacity: 0.9"></a-box>
                    <!-- Gun Handle -->
                    <a-box width="0.035" height="0.12" depth="0.04" position="0 -0.06 0.08" rotation="15 0 0" color="#050505" material="metalness: 0.6"></a-box>
                </a-entity>

            </a-entity>
            
            <a-entity id="movement-arrow" visible="false">
                <a-cone radius-bottom="0.03" radius-top="0" height="0.25" rotation="90 0 0" material="shader: flat"></a-cone>
            </a-entity>
        </a-entity>

    </a-scene>
</body>
</html>
