<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Pinch & Pull Locomotion</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
      AFRAME.registerComponent('pinch-locomotion', {
        schema: {
          rigId: { type: 'string', default: '#rig' },
          speed: { type: 'number', default: 1.5 }, // Sensitivity of the pull
          feedbackColor: { type: 'color', default: '#00FFFF' }
        },

        init: function () {
          this.rig = document.querySelector(this.data.rigId);
          this.isPinching = false;
          
          // Internal State
          this.initialHandPos = new THREE.Vector3();
          this.currentHandPos = new THREE.Vector3();
          this.delta = new THREE.Vector3();
          
          // Bind Hand Events
          this.el.addEventListener('pinchstarted', (evt) => this.onPinchStart(evt));
          this.el.addEventListener('pinchended', (evt) => this.onPinchEnd(evt));
          
          // Visual Feedback: Create a small glowing spark at the pinch point
          this.feedbackOrb = document.createElement('a-sphere');
          this.feedbackOrb.setAttribute('radius', '0.02');
          this.feedbackOrb.setAttribute('color', this.data.feedbackColor);
          this.feedbackOrb.setAttribute('material', 'emissive', this.data.feedbackColor);
          this.feedbackOrb.setAttribute('visible', 'false');
          this.el.appendChild(this.feedbackOrb);
        },

        onPinchStart: function (evt) {
          this.isPinching = true;
          // Record the world position where the pinch started
          this.initialHandPos.copy(evt.detail.position);
          
          // Show visual feedback at the hand
          this.feedbackOrb.setAttribute('visible', 'true');
          this.feedbackOrb.setAttribute('position', this.el.object3D.worldToLocal(this.initialHandPos.clone()));
        },

        onPinchEnd: function () {
          this.isPinching = false;
          this.feedbackOrb.setAttribute('visible', 'false');
        },

        tick: function (time, delta) {
          if (!this.isPinching) return;

          // Get the current position of the hand in world space
          this.el.object3D.getWorldPosition(this.currentHandPos);

          // Calculate how far the hand has moved since the pinch started
          // Movement = Initial - Current (to pull the world toward you)
          this.delta.subVectors(this.initialHandPos, this.currentHandPos);

          // Apply locomotion to the rig
          const rigPos = this.rig.getAttribute('position');
          rigPos.x += this.delta.x * this.data.speed;
          rigPos.y += this.delta.y * this.data.speed; // Allows vertical swimming/climbing
          rigPos.z += this.delta.z * this.data.speed;
          
          this.rig.setAttribute('position', rigPos);

          // Update the "anchor" so the movement is continuous and smooth
          this.initialHandPos.copy(this.currentHandPos);
          
          // Pulse the feedback orb based on movement speed
          const pulse = 0.5 + Math.sin(time / 100) * 0.5;
          this.feedbackOrb.setAttribute('material', 'emissiveIntensity', 1 + pulse);
        }
      });
    </script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hand-tracking">
      
      <a-assets>
        <a-mixin id="monolith" geometry="primitive: box; width: 2; height: 10; depth: 2" material="color: #333; metalness: 0.8; roughness: 0.2"></a-mixin>
      </a-assets>

      <a-entity environment="preset: starry; grid: dots; groundColor: #111; gridColor: #444"></a-entity>

      <a-entity mixin="monolith" position="-10 5 -15" material="color: #ff4444"></a-entity>
      <a-entity mixin="monolith" position="10 5 -15" material="color: #44ff44"></a-entity>
      <a-entity mixin="monolith" position="0 5 -25" material="color: #4444ff"></a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-entity id="camera" camera look-controls position="0 1.6 0">
          <a-text value="PINCH AND PULL AIR TO MOVE" 
                  position="0 0.4 -1" align="center" width="1.2" color="#00FFFF">
          </a-text>
        </a-entity>

        <a-entity id="leftHand" 
                  hand-tracking-controls="hand: left" 
                  pinch-locomotion="rigId: #rig; speed: 1.2; feedbackColor: #FF00FF">
        </a-entity>

        <a-entity id="rightHand" 
                  hand-tracking-controls="hand: right" 
                  pinch-locomotion="rigId: #rig; speed: 1.2; feedbackColor: #00FFFF">
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
