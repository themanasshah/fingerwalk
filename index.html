<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Finger-Walking Locomotion</title>
    <meta name="description" content="A-Frame VR Hand Tracking Locomotion">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script>
      /**
       * Component: finger-walking
       * Detects alternating index/middle finger taps against the palm
       * to drive locomotion based on 'walking' frequency.
       */
      AFRAME.registerComponent('finger-walking', {
        schema: {
          rigSelector: {type: 'string', default: '#rig'},
          maxSpeed: {type: 'number', default: 3.0}, // m/s
          speedGain: {type: 'number', default: 0.8}, // speed per Hz
          contactThreshold: {type: 'number', default: 0.025}, // meters
          stepTimeout: {type: 'number', default: 0.6}, // seconds until stop
          windowSize: {type: 'number', default: 5} // number of steps for frequency calc
        },

        init: function () {
          this.rig = document.querySelector(this.data.rigSelector);
          this.steps = []; // timestamps of recent steps
          this.lastStepFinger = null; // 'index' or 'middle'
          this.currentSpeed = 0;
          this.isMoving = false;
          
          // State for tracking "up" vs "down" to detect a discrete tap
          this.fingerStates = {
            index: { pressed: false },
            middle: { pressed: false }
          };

          // Reference to the speed bar UI
          this.speedBar = this.el.querySelector('.speed-bar-fill');
          
          // Audio setup (Procedural Click)
          // We use a getter to initialize on first interaction to bypass browser autoplay policies
          this.audioCtx = null;
          
          // Direction vector helpers
          this.direction = new THREE.Vector3();
          this.handQuat = new THREE.Quaternion();
        },

        initAudio: function() {
          if (!this.audioCtx) {
            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (this.audioCtx.state === 'suspended') {
            this.audioCtx.resume();
          }
        },

        playClick: function() {
          this.initAudio();
          const osc = this.audioCtx.createOscillator();
          const gain = this.audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(150 + (this.currentSpeed * 50), this.audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(10, this.audioCtx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.1);
          osc.connect(gain);
          gain.connect(this.audioCtx.destination);
          osc.start();
          osc.stop(this.audioCtx.currentTime + 0.1);
        },

        spawnRipple: function(position) {
          const ripple = document.createElement('a-ring');
          ripple.setAttribute('radius-inner', 0.005);
          ripple.setAttribute('radius-outer', 0.01);
          ripple.setAttribute('color', '#00e5ff');
          ripple.setAttribute('rotation', '-90 0 0');
          ripple.setAttribute('position', position);
          
          this.el.appendChild(ripple);

          // Animation for the ripple
          let scale = 1;
          let opacity = 1;
          const animate = () => {
            scale += 0.1;
            opacity -= 0.05;
            if (ripple.getAttribute('scale')) {
               ripple.setAttribute('scale', `${scale} ${scale} ${scale}`);
               ripple.setAttribute('opacity', opacity);
            }
            if (opacity > 0) {
              requestAnimationFrame(animate);
            } else {
              if(ripple.parentNode) ripple.parentNode.removeChild(ripple);
            }
          };
          animate();
        },

        tick: function (time, delta) {
          const handControls = this.el.components['hand-tracking-controls'];
          if (!handControls || !handControls.joints) return;

          const joints = handControls.joints;
          // Verify joints are actually tracked/populated
          if (!joints['palm'] || !joints['index-finger-tip'] || !joints['middle-finger-tip']) return;
          if (!joints['palm'].visible) return; // Hand not currently tracked

          const dt = delta / 1000;
          const now = performance.now() / 1000;

          // Get Joint Positions
          const palmPos = joints['palm'].position;
          const indexPos = joints['index-finger-tip'].position;
          const middlePos = joints['middle-finger-tip'].position;

          // Compute Distances
          const distIndex = palmPos.distanceTo(indexPos);
          const distMiddle = palmPos.distanceTo(middlePos);

          // Step Detection Logic
          this.checkFingerStep('index', distIndex, indexPos, now);
          this.checkFingerStep('middle', distMiddle, middlePos, now);

          // Clean up old steps and handle timeout
          if (this.steps.length > 0 && (now - this.steps[this.steps.length - 1]) > this.data.stepTimeout) {
            this.steps = [];
          }

          // Calculate Speed based on Frequency
          if (this.steps.length >= 2) {
            const duration = this.steps[this.steps.length - 1] - this.steps[0];
            const frequency = (this.steps.length - 1) / Math.max(duration, 0.1);
            const targetSpeed = Math.min(frequency * this.data.speedGain, this.data.maxSpeed);
            // Smooth speed transition
            this.currentSpeed = this.currentSpeed * 0.9 + targetSpeed * 0.1;
          } else {
            // Faster decay when no activity
            this.currentSpeed = Math.max(0, this.currentSpeed - dt * 5); 
          }

          // Apply Movement
          if (this.currentSpeed > 0.01 && this.rig) {
            // Get hand orientation
            this.el.object3D.getWorldQuaternion(this.handQuat);
            
            // Forward is local negative Z
            this.direction.set(0, 0, -1);
            this.direction.applyQuaternion(this.handQuat);
            
            // Keep movement on the horizontal plane
            this.direction.y = 0;
            this.direction.normalize();

            // Translate Rig
            const moveStep = this.direction.multiplyScalar(this.currentSpeed * dt);
            this.rig.object3D.position.add(moveStep);
          }

          // Update UI Scale
          if (this.speedBar) {
            const speedRatio = Math.min(this.currentSpeed / this.data.maxSpeed, 1);
            this.speedBar.setAttribute('scale', `${Math.max(speedRatio, 0.001)} 1 1`);
            const color = speedRatio > 0.8 ? '#ff4081' : '#00e5ff';
            this.speedBar.setAttribute('color', color);
          }
        },

        checkFingerStep: function(finger, dist, pos, now) {
          const threshold = this.data.contactThreshold;
          const state = this.fingerStates[finger];

          if (dist < threshold) {
            if (!state.pressed) {
              state.pressed = true;
              this.steps.push(now);
              if (this.steps.length > this.data.windowSize) this.steps.shift();

              // Feedback
              this.spawnRipple(this.el.object3D.worldToLocal(pos.clone()));
              this.playClick();
            }
          } else if (dist > threshold + 0.01) {
            state.pressed = false;
          }
        }
      });
    </script>
  </head>
  <body>
    <!-- Added renderer settings to ensure high performance/correct loading -->
    <a-scene webxr="requiredFeatures: hand-tracking" renderer="antialias: true; colorManagement: true;">
      <a-assets>
        <img id="grid" src="https://img.itch.zone/aW1nLzI0NjE3MjgucG5n/original/m%2F6LhJ.png" crossorigin="anonymous">
      </a-assets>

      <!-- Camera Rig -->
      <a-entity id="rig" position="0 0 0">
        <a-camera position="0 1.6 0" look-controls></a-camera>
        
        <!-- Left Hand -->
        <a-entity id="leftHand" hand-tracking-controls="hand: left;" finger-walking="rigSelector: #rig">
            <a-entity position="0 0.08 0" rotation="-90 0 0">
                <a-plane width="0.1" height="0.01" color="#333" opacity="0.5"></a-plane>
                <a-plane class="speed-bar-fill" width="0.1" height="0.01" color="#00e5ff" position="0 0 0.001" scale="0.001 1 1" pivot="-0.05 0 0"></a-plane>
            </a-entity>
        </a-entity>

        <!-- Right Hand -->
        <a-entity id="rightHand" hand-tracking-controls="hand: right;" finger-walking="rigSelector: #rig">
            <a-entity position="0 0.08 0" rotation="-90 0 0">
                <a-plane width="0.1" height="0.01" color="#333" opacity="0.5"></a-plane>
                <a-plane class="speed-bar-fill" width="0.1" height="0.01" color="#00e5ff" position="0 0 0.001" scale="0.001 1 1" pivot="-0.05 0 0"></a-plane>
            </a-entity>
        </a-entity>
      </a-entity>

      <!-- Environment -->
      <a-sky color="#111"></a-sky>
      
      <a-entity position="0 1.5 -2" text="value: HOW TO MOVE:\nHold your hand palm down.\n'Walk' your index and middle fingers\nagainst your palm to move forward.\nFaster tapping = Faster speed.; align: center; width: 3; color: #00e5ff"></a-entity>

      <a-plane rotation="-90 0 0" width="100" height="100" src="#grid" repeat="100 100" material="roughness: 1; metalness: 0"></a-plane>

      <a-entity position="5 0.5 -10" geometry="primitive: box" material="color: #f44336"></a-entity>
      <a-entity position="-5 1 -15" geometry="primitive: sphere" material="color: #4caf50"></a-entity>
      <a-entity position="10 0.75 -25" geometry="primitive: cylinder" material="color: #2196f3"></a-entity>
      <a-entity position="-12 2 -30" geometry="primitive: torus" material="color: #ffeb3b"></a-entity>
      
      <a-entity light="type: point; intensity: 0.8; distance: 50; decay: 2" position="0 5 0"></a-entity>
      <a-entity light="type: ambient; color: #666"></a-entity>

    </a-scene>
  </body>
</html>
