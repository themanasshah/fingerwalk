<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Finger Direction VR Locomotion</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

<style>
body { margin:0; }
</style>

<script>

AFRAME.registerComponent("finger-locomotion",{

init:function(){

this.cameraRig = document.querySelector("#rig")
this.hand = document.querySelector("#leftHand")
this.feedback = document.querySelector("#feedback")

this.speed = 0.08
this.moving = false

},

tick:function(){

if(!this.hand.components["hand-tracking-controls"]) return

let indexTip = this.hand.object3D.getObjectByName("index-finger-tip")
let indexBase = this.hand.object3D.getObjectByName("index-finger-phalanx-proximal")

if(!indexTip || !indexBase) return

let tipPos = new THREE.Vector3()
let basePos = new THREE.Vector3()

indexTip.getWorldPosition(tipPos)
indexBase.getWorldPosition(basePos)

let direction = tipPos.clone().sub(basePos).normalize()

let extended = tipPos.distanceTo(basePos) > 0.04

if(extended){

this.moving = true

this.cameraRig.object3D.position.x += direction.x * this.speed
this.cameraRig.object3D.position.z += direction.z * this.speed

this.feedback.setAttribute("value","MOVING")
this.feedback.setAttribute("color","#00ff88")

this.hand.setAttribute("raycaster","lineColor: #00ff88")

}else{

this.moving = false

this.feedback.setAttribute("value","STOPPED")
this.feedback.setAttribute("color","#ff4444")

this.hand.setAttribute("raycaster","lineColor: #ff4444")

}

}

})

</script>

</head>

<body>

<a-scene background="color:#000">

<a-assets>

<img id="grid" src="https://cdn.aframe.io/a-painter/images/floor.jpg">

</a-assets>

<!-- Camera Rig -->

<a-entity id="rig" position="0 1.6 0" finger-locomotion>

<a-camera></a-camera>

<a-text
id="feedback"
value="STOPPED"
position="0 -0.2 -0.6"
align="center"
color="#ff4444"
width="2">
</a-text>

</a-entity>

<!-- Left Hand -->

<a-entity
id="leftHand"
hand-tracking-controls="hand: left"
raycaster="showLine:true; lineColor:#ff4444"
line="color:#ff4444">
</a-entity>

<!-- Ground -->

<a-plane
rotation="-90 0 0"
width="200"
height="200"
material="src:#grid; repeat:100 100; color:#00aaff">
</a-plane>

<!-- Mountains -->

<a-entity id="mountains">

<script>

let scene = document.querySelector("a-scene")

for(let i=0;i<80;i++){

let pyramid = document.createElement("a-cone")

let x = (Math.random()*200)-100
let z = (Math.random()*200)-100
let h = Math.random()*8 + 2

pyramid.setAttribute("position",`${x} ${h/2} ${z}`)
pyramid.setAttribute("height",h)
pyramid.setAttribute("radius-bottom",h*0.6)
pyramid.setAttribute("radius-top",0)
pyramid.setAttribute("color","#222")

scene.appendChild(pyramid)

}

</script>

</a-entity>

</a-scene>

</body>
</html>
