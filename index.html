<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Operator's VR Finger-Walker</title>
  <!-- A-Frame 1.5.0 for stable WebXR hand tracking -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Environment component -->
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  <script>
    // Oscillate component for floating geometry
    AFRAME.registerComponent('oscillate', {
      schema: {
        speed: {type: 'number', default: 1},
        amount: {type: 'number', default: 0.5},
        offset: {type: 'number', default: 0}
      },
      init: function() { 
        this.baseY = this.el.object3D.position.y; 
      },
      tick: function(time) {
        this.el.object3D.position.y = this.baseY + Math.sin(time / 1000 * this.data.speed + this.data.offset) * this.data.amount;
      }
    });

    // Finger Walking Locomotion
    AFRAME.registerComponent('finger-walking', {
      schema: {
        rig: { type: 'selector', default: '#rig' },
        hudState: { type: 'selector', default: '#hud-state' },
        hudSpd: { type: 'selector', default: '#hud-spd' }
      },

      init: function () {
        this.velocity = new THREE.Vector3(0, 0, 0);
        this.moveDirection = new THREE.Vector3();
        
        // Step tracking
        this.lastFingerDistances = { index: 0, middle: 0 };
        this.fingerState = { index: 'UP', middle: 'UP' };
        this.stepCount = 0;
        this.impulsePower = 1.2; // How much "push" each step gives
        this.friction = 0.95;    // Slow down over time
        
        this.updateHUD('READY\nWalk fingers on left hand');
      },

      updateHUD: function(text, color = '#00ffff') {
        if (this.data.hudState) {
          this.data.hudState.setAttribute('value', text);
          this.data.hudState.setAttribute('color', color);
        }
      },

      tick: function (time, timeDelta) {
        const dt = timeDelta / 1000;
        if (dt === 0) return;

        const sceneEl = this.el.sceneEl;
        if (!sceneEl.is('vr-mode')) return;

        const frame = sceneEl.frame;
        const session = sceneEl.renderer.xr.getSession();
        const refSpace = sceneEl.renderer.xr.getReferenceSpace();

        if (!frame || !session) return;

        // Find Left Hand for locomotion
        let leftHandSource = null;
        for (let source of session.inputSources) {
          if (source.hand && source.handedness === 'left') {
            leftHandSource = source;
            break;
          }
        }

        if (leftHandSource) {
          const wrist = frame.getJointPose(leftHandSource.hand.get('wrist'), refSpace);
          const indexTip = frame.getJointPose(leftHandSource.hand.get('index-finger-tip'), refSpace);
          const middleTip = frame.getJointPose(leftHandSource.hand.get('middle-finger-tip'), refSpace);

          if (wrist && indexTip && middleTip) {
            // 1. Determine Direction: Based on the vector from wrist to index tip (pointing direction)
            this.moveDirection.set(
              indexTip.transform.position.x - wrist.transform.position.x,
              indexTip.transform.position.y - wrist.transform.position.y,
              indexTip.transform.position.z - wrist.transform.position.z
            ).normalize();

            // 2. Detect Steps (Finger Walking)
            // We measure distance from tip to wrist. A "step" is a rapid contraction and extension.
            const getDist = (pose) => {
              const dx = pose.transform.position.x - wrist.transform.position.x;
              const dy = pose.transform.position.y - wrist.transform.position.y;
              const dz = pose.transform.position.z - wrist.transform.position.z;
              return Math.sqrt(dx*dx + dy*dy + dz*dz);
            };

            const dIdx = getDist(indexTip);
            const dMid = getDist(middleTip);

            // Simple threshold-based step detection
            // When finger moves from "Extended" (>0.12m) to "Curled" (<0.08m)
            const checkStep = (currentDist, lastDist, key) => {
              if (currentDist < 0.09 && this.fingerState[key] === 'UP') {
                this.fingerState[key] = 'DOWN';
                return true; // Step triggered
              } else if (currentDist > 0.12) {
                this.fingerState[key] = 'UP';
              }
              return false;
            };

            const indexStep = checkStep(dIdx, this.lastFingerDistances.index, 'index');
            const middleStep = checkStep(dMid, this.lastFingerDistances.middle, 'middle');

            if (indexStep || middleStep) {
              // Add impulse in the direction the hand is pointing
              this.velocity.addScaledVector(this.moveDirection, this.impulsePower);
              this.updateHUD('STEP DETECTED', '#00ffaa');
            } else {
              this.updateHUD('LEFT HAND ACTIVE\nWalk fingers to move');
            }

            this.lastFingerDistances.index = dIdx;
            this.lastFingerDistances.middle = dMid;
          }
        } else {
          this.updateHUD('WAITING FOR LEFT HAND...', '#ff3333');
        }

        // Apply movement physics
        this.velocity.multiplyScalar(this.friction); // Constant deceleration
        
        // Cap max speed
        if (this.velocity.length() > 10) this.velocity.normalize().multiplyScalar(10);

        // Update Rig position
        const rigPos = this.data.rig.object3D.position;
        rigPos.x += this.velocity.x * dt;
        rigPos.y += this.velocity.y * dt;
        rigPos.z += this.velocity.z * dt;

        // Ground constraint
        if (rigPos.y < 0) {
          rigPos.y = 0;
          if (this.velocity.y < 0) this.velocity.y = 0;
        }

        // Telemetry
        if (this.data.hudSpd) {
          this.data.hudSpd.setAttribute('value', `SPD\n${this.velocity.length().toFixed(1)}m/s`);
        }
      }
    });
  </script>
</head>
<body>
  <a-scene webxr="optionalFeatures: hand-tracking;" finger-walking background="color: #000000">
    
    <!-- Environment -->
    <a-entity environment="preset: logic; groundColor: #050510; grid: 1x1; dressingAmount: 40; dressingColor: #00ffff"></a-entity>

    <!-- Floating Exploration Zones -->
    <a-entity position="0 2 -8" oscillate="speed: 1; amount: 0.5">
      <a-box width="4" depth="4" height="0.2" color="#111">
        <a-box width="4.2" depth="4.2" height="0.1" color="#00ffff" wireframe="true"></a-box>
      </a-box>
      <a-text value="STATION ALPHA" align="center" position="0 1 0" side="double" color="#00ffff"></a-text>
    </a-entity>

    <a-entity position="10 6 -15" oscillate="speed: 0.7; amount: 1; offset: 1">
      <a-cylinder radius="3" height="0.2" segments-radial="8" color="#111">
        <a-cylinder radius="3.1" height="0.1" segments-radial="8" color="#ff00ff" wireframe="true"></a-cylinder>
      </a-cylinder>
      <a-torus-knot radius="1" tube="0.05" color="#ff00ff" position="0 2 0" animation="property: rotation; to: 0 360 360; loop: true; dur: 5000"></a-torus-knot>
    </a-entity>

    <a-entity position="-12 4 -20" oscillate="speed: 1.2; amount: 0.3; offset: 2">
      <a-octahedron radius="4" color="#111" opacity="0.8">
        <a-octahedron radius="4.1" color="#00ffaa" wireframe="true"></a-octahedron>
      </a-octahedron>
    </a-entity>

    <!-- Player Rig -->
    <a-entity id="rig" position="0 0 0">
      <a-camera id="head" position="0 1.6 0">
        <!-- Tactical HUD -->
        <a-entity id="hud-container" position="0 0 -0.8">
          <a-ring color="#00ffff" radius-inner="0.03" radius-outer="0.032" opacity="0.4"></a-ring>
          
          <a-text id="hud-spd" 
                  position="-0.5 0.1 0" 
                  value="SPD\n0.0m/s" 
                  align="center" 
                  width="1" 
                  color="#00ffff" 
                  font="monoid">
          </a-text>

          <a-text id="hud-state" 
                  position="0 -0.3 0" 
                  value="SYSTEM BOOTING" 
                  align="center" 
                  width="0.8" 
                  color="#00ffff" 
                  font="monoid">
          </a-text>

          <a-entity line="start: -0.3 -0.25 0; end: 0.3 -0.25 0; color: #00ffff; opacity: 0.2"></a-entity>
        </a-entity>
      </a-camera>

      <!-- Hands -->
      <a-entity id="leftHand" hand-tracking-controls="hand: left; modelColor: #00ffff;"></a-entity>
      <a-entity id="rightHand" hand-tracking-controls="hand: right; modelColor: #00ffff;"></a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
